<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Altitude Editor</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; font-family: system-ui, sans-serif; }
      canvas { display: block; width: 100%; height: 100%; outline: none; }
      #sidebar {
        position: fixed; top: 0; right: 0; width: 240px; height: 100%;
        background: rgba(0,0,0,0.90); color: #ccc; padding: 12px 10px;
        z-index: 20; overflow-y: auto; font-size: 12px;
        border-left: 1px solid rgba(255,255,255,0.1);
      }
      #sidebar h3 { color: #fff; font-size: 13px; margin: 0 0 10px; }
      .section { margin-bottom: 10px; }
      .section-title { color: #999; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
      .toggle-row { display: flex; align-items: center; gap: 6px; padding: 3px 0; cursor: pointer; user-select: none; }
      .toggle-row:hover { background: rgba(255,255,255,0.05); }
      .toggle-row label { cursor: pointer; flex: 1; font-size: 11px; }
      .toggle-row input[type="checkbox"] { cursor: pointer; flex-shrink: 0; }
      hr.divider { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 8px 0; }
      .field-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
      .field-row label { width: 28px; text-align: right; font-size: 10px; color: #999; flex-shrink: 0; }
      .field-row input[type="text"] {
        flex: 1; background: #222; border: 1px solid rgba(255,255,255,0.15);
        color: #fff; padding: 3px 6px; border-radius: 3px; font-size: 11px; font-family: monospace;
      }
      .field-row input[type="text"]:focus { border-color: #5af; outline: none; }
      .btn {
        display: block; width: 100%; padding: 6px 0; margin-bottom: 4px;
        background: #334; color: #ccc; border: 1px solid rgba(255,255,255,0.15);
        border-radius: 4px; cursor: pointer; font-size: 11px; text-align: center;
      }
      .btn:hover { background: #445; color: #fff; }
      .btn-danger { background: #533; border-color: rgba(255,80,80,0.3); color: #faa; }
      .btn-danger:hover { background: #644; color: #fff; }
      .btn-primary { background: #254; border-color: rgba(80,200,255,0.3); color: #8df; }
      .btn-primary:hover { background: #365; color: #fff; }
      #info {
        position: fixed; top: 12px; left: 12px;
        background: rgba(0,0,0,0.7); color: #ccc; padding: 8px 14px;
        border-radius: 6px; font-size: 12px; pointer-events: none; z-index: 10;
      }
      #info strong { color: #fff; }
      #point-editor { display: none; }
      #point-editor.visible { display: block; }
      .hint { color: #888; font-size: 10px; margin-top: 6px; font-style: italic; line-height: 1.4; }
      #level-picker {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: #1a1a2e; display: flex; flex-direction: column;
        align-items: center; justify-content: center; z-index: 100;
      }
      #level-picker h2 { color: #fff; margin-bottom: 16px; }
      #level-picker select { font-size: 16px; padding: 8px 16px; border-radius: 6px; }
      #level-picker button { margin-top: 12px; font-size: 14px; padding: 8px 24px; border-radius: 6px; cursor: pointer; }
      .stats { color: #777; font-size: 10px; margin-top: 8px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div id="level-picker">
      <h2>3D Altitude Editor</h2>
      <select id="level-select"></select>
      <button onclick="window.startEditor();">Open Level</button>
    </div>
    <div id="info">Loading…</div>
    <canvas id="renderCanvas"></canvas>
    <div id="sidebar">
      <h3>Altitude Editor</h3>

      <div class="section">
        <div class="section-title">Layers</div>
        <div class="toggle-row"><input type="checkbox" id="tog-ground" checked><label for="tog-ground">Ground</label></div>
        <div class="toggle-row"><input type="checkbox" id="tog-wireframe"><label for="tog-wireframe">Wireframe</label></div>
        <div class="toggle-row"><input type="checkbox" id="tog-buildings" checked><label for="tog-buildings">Buildings</label></div>
        <div class="toggle-row"><input type="checkbox" id="tog-objects" checked><label for="tog-objects">Objects</label></div>
        <div class="toggle-row"><input type="checkbox" id="tog-manual-trees" checked><label for="tog-manual-trees">Manual Trees</label></div>
        <div class="toggle-row"><input type="checkbox" id="tog-gen-trees"><label for="tog-gen-trees">Generated Trees</label></div>
        <div class="toggle-row"><input type="checkbox" id="tog-water" checked><label for="tog-water">Water</label></div>
        <div class="toggle-row"><input type="checkbox" id="tog-course" checked><label for="tog-course">Course Path</label></div>
        <div class="toggle-row"><input type="checkbox" id="tog-altpoints" checked><label for="tog-altpoints">Altitude Points</label></div>
      </div>

      <hr class="divider">

      <div id="point-editor">
        <div class="section-title">Selected Point</div>
        <div class="field-row"><label>Lat</label><input type="text" id="pt-lat"></div>
        <div class="field-row"><label>Lon</label><input type="text" id="pt-lon"></div>
        <div class="field-row"><label>Alt</label><input type="text" id="pt-alt"></div>
        <div style="margin-top: 6px;">
          <button class="btn btn-danger" id="btn-delete-point">Delete Point</button>
        </div>
        <hr class="divider">
      </div>

      <div class="section">
        <div class="section-title">Actions</div>
        <button class="btn" id="btn-remesh" onclick="window.doRemesh();">Remesh Terrain</button>
        <button class="btn btn-primary" id="btn-export">Copy altitude.json</button>
      </div>

      <hr class="divider">
      <div class="stats" id="stats"></div>

      <div class="hint">
        WASD / Arrows — move camera<br>
        Cmd+click+drag — orbit camera<br>
        Scroll — zoom<br>
        Click point — select<br>
        Drag point — move up/down<br>
        Double-click — add point<br>
      </div>
    </div>
    <script type="module" src="/src/altitude-editor.ts"></script>
  </body>
</html>
