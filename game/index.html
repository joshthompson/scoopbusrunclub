<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scoop Bus Run Club - The Game</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #app { width: 100%; height: 100%; }
      #gameCanvas { width: 100% !important; height: 100% !important; outline: none; }
      #hud {
        position: absolute;
        top: 16px;
        left: 16px;
        color: #fff;
        font-family: monospace;
        font-size: 18px;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        pointer-events: none;
        z-index: 10;
      }
      #hud p { margin-bottom: 4px; }
      #minimap {
        position: absolute;
        bottom: 20px;
        left: 20px;
        border-radius: 50%;
        pointer-events: none;
        z-index: 10;
        max-width: 30vw;
        max-height: 30vw;
      }
      #loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a1a2e;
        color: #e0e0e0;
        font-family: monospace;
        font-size: 24px;
        z-index: 100;
      }
    </style>
    <script type="module" crossorigin src="/game/assets/index-BUrYM2am.js"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
