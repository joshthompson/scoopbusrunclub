name: Deploy Web to GitHub Pages

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm nx run web:build
        env:
          VITE_CONVEX_URL: ${{ vars.VITE_CONVEX_URL }}

      - run: pnpm nx run game:build
        env:
          VITE_CONVEX_URL: ${{ vars.VITE_CONVEX_URL }}

      - name: Copy game dist into web dist
        run: cp -r apps/game/dist apps/web/dist/game

      - name: Copy index.html to 404.html
        run: cp apps/web/dist/index.html apps/web/dist/404.html

      - name: Create admin/index.html with admin icons
        run: |
          mkdir -p apps/web/dist/admin
          sed -e 's|href="/favicon-96x96.png"|href="/admin/favicon-96x96.png"|' \
              -e 's|href="/favicon-152x152.png"|href="/admin/favicon-152x152.png"|' \
              -e 's|href="/apple-touch-icon.png"|href="/admin/apple-touch-icon.png"|' \
              -e 's|href="/favicon-192x192.png"|href="/admin/favicon-192x192.png"|' \
              -e 's|href="/favicon-512x512.png"|href="/admin/favicon-512x512.png"|' \
              apps/web/dist/index.html > apps/web/dist/admin/index.html

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: apps/web/dist
          branch: gh-pages
